dataset:
  n_rows: 1000
  output_path: data/raw/df_suppliers.csv

categories:
  electronics: 0.30
  metals: 0.20
  packaging: 0.15
  chemicals: 0.10
  plastics: 0.10
  logistics: 0.10
  textiles: 0.05

country_city:
  China:
    - Shenzhen
    - Guangzhou

  India:
    - Pune
    - Chennai

  Germany:
    - Hamburg
    - Munich

  USA:
    - Austin
    - Detroit

  Vietnam:
    - Ho Chi Minh City

criticality:
  values: [1, 2, 3, 4, 5]
  probabilities: [0.1, 0.2, 0.35, 0.25, 0.1]

payment_terms:
  values: [15, 30, 45, 60, 90]
  probabilities: [0.05, 0.40, 0.25, 0.20, 0.10]

supplier_name_generation:
  prefixes:
    - Global
    - Prime
    - Apex
    - Nova
    - Delta

  industries:
    - Electro
    - Steel
    - Circuits
    - Metals
    - Components

  suffixes:
    - Ltd
    - Corp
    - Inc
    - GmbH

onboarding_time_days:
  electronics:
    min: 60
    max: 180

  chemicals:
    min: 45
    max: 120

  packaging:
    min: 15
    max: 45

  logistics:
    min: 7
    max: 30

  default:
    min: 20
    max: 89

contract_value:
  distribution: lognormal
  mean: 11
  sigma: 1

alternate_supplier_logic:
  formula: "random < (1 - criticality * 0.15)"